{% load static %}
<!DOCTYPE html>
<html lang="en" style="scroll-behavior: smooth;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
    <title>{% block title %}Cinematic Portfolio{% endblock %}</title>
    <style>
        /* Critical inline CSS - guarantees base layout even if external CSS fails */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; width: 100%; }
        body { width: 100%; min-height: 100vh; font-size: 16px; background: #0a0a0a; color: #e0e0e0; overflow-x: hidden; }
    </style>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Cursor follower -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="/#home">Home</a></li>
            <li><a href="/#about">About</a></li>
            <li><a href="/#work">Work</a></li>
            <li><a href="/#contact">Contact</a></li>
        </ul>
        
        <div class="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="{% static 'js/script.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
